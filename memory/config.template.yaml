vault_path: <YOUR_VAULT_PATH>
storage_dir: <YOUR_STORAGE_PATH>
ollama:
  base_url: <YOUR_OLLAMA_URL>
  model: <YOUR_MODEL_NAME>
memory:
  extensions:
    - .md
  exclude_dirs:
    - .obsidian
    - .trash
    - .git
  chunk_size: 1200
  chunk_overlap: 200
search:
  vector_top_k: 8
  lexical_top_k: 8
  final_top_k: 8
  exclude_path_patterns: []
archiving:
  inbox_dir: Inbox/
  conversations_dir: Conversations/
  notes_dir: Notes/
  projects_dir: Projects/
  important_dir: Important/
  default_category: conversations
agents:
  archivist:
    collection: agent_archivist_memory
    storage_subdir: agents/archivist
    include_paths:
      - Shared/
      - Agents/Archivist/
      - Inbox/
      - Conversations/
      - Important/
      - Projects/
      - Notes/
      - Playbooks/
      - Decisions/
      - Logs/
    query_hint: vault structure, exact remembered statements, note hygiene, knowledge organization
    exclude_path_patterns: []
  router:
    collection: agent_router_memory
    storage_subdir: agents/router
    include_paths:
      - Shared/
      - Agents/Router/
      - Decisions/
      - Projects/
      - Notes/
      - Important/
    query_hint: routing priorities, task classification, risk, acceptance criteria
    exclude_path_patterns: []
  researcher:
    collection: agent_researcher_memory
    storage_subdir: agents/researcher
    include_paths:
      - Shared/
      - Agents/Researcher/
      - Projects/
      - Notes/
      - Logs/
      - Decisions/
      - Important/
    query_hint: investigations, code traces, findings, prior incidents
    exclude_path_patterns: []
  architect:
    collection: agent_architect_memory
    storage_subdir: agents/architect
    include_paths:
      - Shared/
      - Agents/Architect/
      - Decisions/
      - Projects/
      - Playbooks/
      - Important/
    query_hint: architecture decisions, invariants, contracts, tradeoffs
    exclude_path_patterns: []
  implementer:
    collection: agent_implementer_memory
    storage_subdir: agents/implementer
    include_paths:
      - Shared/
      - Agents/Implementer/
      - Projects/
      - Playbooks/
      - Notes/
    query_hint: implementation patterns, selectors, seams, code conventions
    exclude_path_patterns: []
  reviewer:
    collection: agent_reviewer_memory
    storage_subdir: agents/reviewer
    include_paths:
      - Shared/
      - Agents/Reviewer/
      - Logs/
      - Decisions/
      - Playbooks/
      - Important/
    query_hint: regressions, edge cases, postmortems, failure patterns
    exclude_path_patterns: []
  tester:
    collection: agent_tester_memory
    storage_subdir: agents/tester
    include_paths:
      - Shared/
      - Agents/Tester/
      - Logs/
      - Playbooks/
      - Projects/
      - Notes/
    query_hint: checklists, repro steps, observed failures, verification notes
    exclude_path_patterns: []
  test-strategist:
    collection: agent_test_strategist_memory
    storage_subdir: agents/test-strategist
    include_paths:
      - Shared/
      - Agents/Test-Strategist/
      - Decisions/
      - Playbooks/
      - Projects/
      - Important/
    query_hint: test pyramid, coverage strategy, ROI, suite design
    exclude_path_patterns: []
  test-automation-engineer:
    collection: agent_test_automation_engineer_memory
    storage_subdir: agents/test-automation-engineer
    include_paths:
      - Shared/
      - Agents/Test-Automation-Engineer/
      - Playbooks/
      - Projects/
      - Logs/
      - Notes/
    query_hint: Playwright patterns, API tests, flake reduction, helpers
    exclude_path_patterns: []
  qa-browser:
    collection: agent_qa_browser_memory
    storage_subdir: agents/qa-browser
    include_paths:
      - Shared/
      - Agents/QA-Browser/
      - Logs/
      - Playbooks/
      - Projects/
      - Notes/
      - Important/
    query_hint: browser repro, auth flows, UI regressions, exploratory QA
    exclude_path_patterns: []
