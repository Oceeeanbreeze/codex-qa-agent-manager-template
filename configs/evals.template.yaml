datasets:
  routing: evals/routing-cases.yaml
  retrieval: evals/retrieval-cases.yaml
  reviewer: evals/reviewer-cases.yaml
  coverage: evals/coverage-cases.yaml
  browser_validation: evals/browser-validation-cases.yaml

metrics:
  route_accuracy_target: 0.95
  retrieval_precision_at_5_target: 0.80
  reviewer_quality_target: 0.80
  coverage_decision_target: 0.85
  verification_explicitness_target: 0.95

quality_gates:
  dataset_readiness_target: 1.0
  valid_case_ratio_target: 1.0
  minimum_case_counts:
    routing: 2
    retrieval: 2
    reviewer: 2
    coverage: 2
    browser_validation: 2

gates:
  block_scale_up_if:
    - dataset_readiness_below_target
    - valid_case_ratio_below_target

reports:
  directory: reports/evals
  keep_history: true
